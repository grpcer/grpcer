name: generate snake animation

on:
  # 每 12 小时自动重画一次贪吃蛇
  schedule:
    - cron: "0 */12 * * *"
  # 允许在 Actions 页面手动触发（首次上线用得到）
  workflow_dispatch:
  # 推到 main 时也跑一次
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: grpcer
          # 暗色 + 霓虹青蛇身，和 README 配色统一
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=00F5D4&color_dots=161B22,0E4429,006D32,26A641,39D353

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
