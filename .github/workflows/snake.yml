name: generate snake animation

on:
  # 每 12 小时自动重画一次贪吃蛇
  schedule:
    - cron: "0 */12 * * *"
  # 允许在 Actions 页面手动触发（首次上线用得到）
  workflow_dispatch:
  # 推到 main 时也跑一次
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: grpcer
          # 深色版给 dark 主题、浅色版给 light 主题，各自融底不撞色
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=2DD4BF
            dist/snake-light.svg?palette=github-light&color_snake=0D9488

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
