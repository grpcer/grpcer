name: GitHub-Profile-3D-Contrib

on:
  # 每天 03:00 CST(北京时间) == 19:00 UTC 前一天自动重画
  schedule:
    - cron: "0 19 * * *"
  # 允许在 Actions 页面手动触发（首次上线用得到）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          # 换成有 private 仓库读权限的 PAT，把 oriveo/tokpet-dev 的贡献活动也纳入统计
          GITHUB_TOKEN: ${{ secrets.LANG_STATS_PAT }}
          USERNAME: ${{ github.repository_owner }}
          # 只出贡献类型雷达图（commit/repo/review/pullreq/issue），不生成 3D 方块日历和语言饼图——
          # 3D 日历跟已有的 snake/activity-graph/streak 重复，语言饼图被 lang-stats.yml 的聚合图取代
          SETTING_JSON: .github/profile-radar-settings.json
      - name: remove stale preset outputs
        run: rm -f profile-3d-contrib/profile-*.svg
      - name: commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A profile-3d-contrib
          if git commit -m "chore: 自动生成贡献雷达图"; then
            git push
          fi
